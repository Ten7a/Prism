services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'prism']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  mailcatcher:
    image: dockage/mailcatcher
    ports:
      - '1080:1080'
      - '1025:1025'
    profiles: ['dev']

volumes:
  postgres_data: {}
